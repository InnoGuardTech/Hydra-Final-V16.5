services:
  - type: web
    name: webook-bot
    env: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    envVars:
      # ── Telegram (sealed secrets — set via Render dashboard) ────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: AUTHORIZED_CHAT_IDS
        sync: false

      # ── Persistent database ────────────────────────────────────────
      - key: DATABASE_URL
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false

      # ── Server defaults ───────────────────────────────────────────
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "10000"
      - key: KEEP_ALIVE_ENABLED
        value: "true"
      - key: KEEP_ALIVE_INTERVAL
        value: "600"
      - key: EVENT_POLL_INTERVAL
        value: "300"
      - key: HEADLESS
        value: "true"
      - key: LOG_LEVEL
        value: "INFO"
      - key: WEBOOK_LANG
        value: "ar"

      # ── Hydra Seat Engine ─────────────────────────────────────────
      - key: SEATSIO_ENABLED
        value: "true"
      - key: SEATSIO_PREWARM_ENABLED
        value: "true"
      - key: SEATSIO_DROP_WATCHER_ENABLED
        value: "true"
      - key: SEATSIO_DROP_WATCHER_MAX_WAIT
        value: "1800"
      - key: SEATSIO_STATUS_INTERVAL
        value: "0.60"

      # ── Payment ───────────────────────────────────────────────────
      - key: DEFAULT_PAYMENT_METHOD
        value: "credit_card"

      # ── Reliability (sealed) ──────────────────────────────────────
      - key: CAPTCHA_API_KEY
        sync: false
      - key: PROXY_SERVER
        sync: false
      - key: PROXY_USERNAME
        sync: false
      - key: PROXY_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
