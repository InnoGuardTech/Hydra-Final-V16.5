version: "3.9"
services:
  hydra:
    build:
      context: .
      target: runtime
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PORT: 8080
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-}
      SENTRY_ENABLED: ${SENTRY_ENABLED:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./sessions:/app/sessions
