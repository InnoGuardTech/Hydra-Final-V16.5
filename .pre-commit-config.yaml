repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.1
    hooks:
      - id: ruff
        files: ^(app/core/config\.py|app/core/config_loader\.py|app/core/logging_setup\.py|main\.py)$
      - id: ruff-format
        files: ^(app/core/config\.py|app/core/config_loader\.py|app/core/logging_setup\.py|main\.py)$
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: [pydantic-settings]
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-q", "-s", "B101,B104,B110", "app/core/config.py", "app/core/config_loader.py", "app/core/logging_setup.py", "main.py"]
